<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="60%" stop-color="#0c0b10"/>
      <stop offset="100%" stop-color="#08070c"/>
    </linearGradient>
    <radialGradient id="globe" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#243049"/>
      <stop offset="55%" stop-color="#141a2b"/>
      <stop offset="100%" stop-color="#0b0e18"/>
    </radialGradient>
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd27a" stop-opacity="0"/>
      <stop offset="80%" stop-color="#ffd27a" stop-opacity="0"/>
      <stop offset="93%" stop-color="#ffba52" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffba52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2cf"/>
      <stop offset="35%" stop-color="#ffce72"/>
      <stop offset="100%" stop-color="#ffce72" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="70" cy="60" r="1.3" opacity=".7"/><circle cx="150" cy="120" r="0.8" opacity=".5"/>
    <circle cx="230" cy="40" r="1.1" opacity=".8"/><circle cx="310" cy="150" r="0.7" opacity=".4"/>
    <circle cx="400" cy="70" r="1.5" opacity=".85"/><circle cx="120" cy="220" r="0.9" opacity=".6"/>
    <circle cx="60" cy="330" r="1.2" opacity=".7"/><circle cx="200" cy="300" r="0.7" opacity=".4"/>
    <circle cx="340" cy="250" r="1" opacity=".6"/><circle cx="90" cy="450" r="1.4" opacity=".8"/>
    <circle cx="180" cy="520" r="0.8" opacity=".5"/><circle cx="300" cy="470" r="1.1" opacity=".7"/>
    <circle cx="420" cy="540" r="0.9" opacity=".55"/><circle cx="520" cy="500" r="1.3" opacity=".75"/>
    <circle cx="470" cy="200" r="0.8" opacity=".5"/><circle cx="560" cy="120" r="1.2" opacity=".7"/>
    <circle cx="640" cy="60" r="0.9" opacity=".55"/><circle cx="720" cy="140" r="1.4" opacity=".8"/>
    <circle cx="610" cy="560" r="1" opacity=".6"/><circle cx="700" cy="500" r="0.7" opacity=".4"/>
    <circle cx="820" cy="70" r="1.1" opacity=".7"/><circle cx="900" cy="140" r="0.8" opacity=".5"/>
    <circle cx="1010" cy="60" r="1.3" opacity=".8"/><circle cx="1100" cy="120" r="0.9" opacity=".6"/>
    <circle cx="1150" cy="40" r="0.7" opacity=".45"/><circle cx="1060" cy="220" r="1.1" opacity=".7"/>
    <circle cx="1140" cy="300" r="0.8" opacity=".5"/><circle cx="1090" cy="430" r="1.2" opacity=".7"/>
    <circle cx="1160" cy="520" r="0.9" opacity=".55"/><circle cx="990" cy="560" r="1.1" opacity=".65"/>
    <circle cx="880" cy="520" r="0.7" opacity=".4"/><circle cx="780" cy="580" r="1" opacity=".6"/>
    <circle cx="500" cy="350" r="0.7" opacity=".4"/><circle cx="440" cy="430" r="0.9" opacity=".5"/>
    <circle cx="260" cy="380" r="0.7" opacity=".4"/><circle cx="160" cy="400" r="1" opacity=".6"/>
    <circle cx="350" cy="560" r="0.8" opacity=".5"/><circle cx="40" cy="180" r="0.9" opacity=".55"/>
  </g>

  <!-- globe -->
  <g transform="translate(930 312)">
    <circle r="290" fill="url(#globeGlow)"/>
    <circle r="248" fill="url(#globe)"/>
    <circle r="248" fill="none" stroke="#ffba52" stroke-opacity="0.5" stroke-width="2"/>
    <!-- faint meridian/parallel arcs -->
    <ellipse rx="248" ry="95" fill="none" stroke="#5c6b8a" stroke-opacity="0.25" stroke-width="1.5"/>
    <ellipse rx="120" ry="248" fill="none" stroke="#5c6b8a" stroke-opacity="0.2" stroke-width="1.5"/>
    <ellipse rx="220" ry="248" fill="none" stroke="#5c6b8a" stroke-opacity="0.12" stroke-width="1.5"/>
    <!-- glowing lighthouses on the globe -->
    <circle cx="-90" cy="-70" r="8" fill="url(#dot)"/>
    <circle cx="60" cy="-120" r="7" fill="url(#dot)"/>
    <circle cx="140" cy="20" r="8" fill="url(#dot)"/>
    <circle cx="-40" cy="90" r="7" fill="url(#dot)"/>
    <circle cx="90" cy="140" r="6" fill="url(#dot)"/>
    <circle cx="-150" cy="40" r="6" fill="url(#dot)"/>
  </g>

  <!-- text -->
  <text x="90" y="212" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" letter-spacing="6" fill="#ffba52" opacity="0.85">INTERACTIVE 3D GLOBE</text>
  <text x="86" y="320" font-family="'Helvetica Neue', Arial, sans-serif" font-size="116" font-weight="700" fill="#ffd27a">Luminary</text>
  <text x="90" y="382" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="600" fill="#f3ead6">Lighthouses of the World</text>
  <text x="90" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="25" fill="#9aa3b2">All 14,804 lighthouses on Earth, on a globe of stars.</text>
</svg>
