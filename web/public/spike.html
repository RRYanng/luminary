<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luminary — MapLibre 3D spike</title>
    <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
    <script type="importmap">
      { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js" } }
    </script>
    <style>
      html, body { margin: 0; height: 100%; background: #000008; }
      /* Procedural starfield, drawn once to a full-screen canvas behind the map.
         MapLibre v5 has no native stars and the map canvas is transparent in
         the space around the globe (and above the horizon when pitched), so the
         stars show through. Generated in JS — no image to download, and the
         brightness/density are tunable so they read clearly at globe zoom. */
      #stars { position: fixed; inset: 0; z-index: 0; display: block; }
      #map { position: absolute; inset: 0; z-index: 1; background: transparent; }
      .hud {
        position: absolute; top: 16px; left: 16px; z-index: 1;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f3ecdd; text-shadow: 0 1px 6px #000; pointer-events: none;
      }
      .hud h1 { margin: 0 0 2px; font-size: 18px; color: #ffd27a; letter-spacing: .06em; }
      .hud .meta { opacity: .85; font-variant-numeric: tabular-nums; }
      .hud .hint { opacity: .55; margin-top: 6px; }
      .fps {
        position: absolute; bottom: 12px; right: 14px; z-index: 1;
        font: 12px ui-monospace, Menlo, monospace; color: #8fbcff; opacity: .65;
      }
    </style>
  </head>
  <body>
    <canvas id="stars"></canvas>
    <div id="map"></div>
    <div class="hud">
      <h1>Luminary · MapLibre 3D spike</h1>
      <div class="meta">zoom <span id="zoom">–</span> · <span id="proj">–</span> · <span id="count">loading…</span></div>
      <div class="hint">scroll to zoom (globe ⇄ 3D street) · drag to pan · right-drag / ctrl-drag to tilt &amp; rotate</div>
    </div>
    <div class="fps" id="fps">– fps</div>

    <script type="module">
      import * as THREE from "three";
      const maplibregl = window.maplibregl;

      // ---- procedural starfield (drawn behind the transparent map canvas)
      const starsCanvas = document.getElementById("stars");
      function drawStars() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const w = window.innerWidth, h = window.innerHeight;
        starsCanvas.width = w * dpr;
        starsCanvas.height = h * dpr;
        starsCanvas.style.width = w + "px";
        starsCanvas.style.height = h + "px";
        const ctx = starsCanvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = "#000008";
        ctx.fillRect(0, 0, w, h);
        const n = Math.round((w * h) / 1400); // density
        for (let i = 0; i < n; i++) {
          const x = Math.random() * w, y = Math.random() * h;
          const r = Math.random() * 1.1 + 0.25;
          const a = Math.random() * 0.55 + 0.4;
          const tint = Math.random();
          ctx.fillStyle = tint < 0.15 ? `rgba(185,205,255,${a})`
            : tint > 0.9 ? `rgba(255,228,196,${a})` : `rgba(255,255,255,${a})`;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        // a few brighter stars with a soft halo
        for (let i = 0; i < n / 35; i++) {
          const x = Math.random() * w, y = Math.random() * h, r = Math.random() * 1.4 + 1.1;
          const g = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
          g.addColorStop(0, "rgba(255,255,255,0.95)");
          g.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x, y, r * 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      drawStars();
      window.addEventListener("resize", drawStars);

      // The one lighthouse we render as a 3D model in this spike.
      // Farol de Santa Marta (Cascais) — real coords from our dataset; sits in
      // town so its size can be judged against real buildings.
      const MODEL = { lng: -9.42097, lat: 38.69039, name: "Farol de Santa Marta (Cascais)" };

      const map = new maplibregl.Map({
        container: "map",
        style: "https://tiles.openfreemap.org/styles/dark",
        center: [MODEL.lng, MODEL.lat],
        zoom: 17,
        pitch: 65,        // ground-hugging 3D street view, not top-down
        bearing: 24,
        maxPitch: 80,     // default cap is 60; raise it so 65–70° is allowed
        hash: true,       // shareable #zoom/lat/lng/bearing/pitch
        antialias: true,
        attributionControl: { compact: true },
      });
      window.lumMap = map;
      map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "bottom-left");

      // ---- warm radial-glow sprite, reused for the symbol icon and the model halo
      function glowCanvas(size = 64) {
        const c = document.createElement("canvas");
        c.width = c.height = size;
        const ctx = c.getContext("2d");
        const r = size / 2;
        const g = ctx.createRadialGradient(r, r, 0, r, r, r);
        g.addColorStop(0.0, "rgba(255,255,255,1)");
        g.addColorStop(0.25, "rgba(255,236,190,0.9)");
        g.addColorStop(0.55, "rgba(255,196,110,0.45)");
        g.addColorStop(1.0, "rgba(255,176,70,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, size, size);
        return c;
      }

      // ---- procedurally-built lighthouse (real meters; 1 unit = 1 m).
      // Shared model for all lighthouses later. Built Y-up; a +90° X rotation in
      // the render matrix stands it upright on the map.
      let lanternMat, haloMat, glowSprite;
      function buildLighthouse() {
        const g = new THREE.Group();
        const white = new THREE.MeshStandardMaterial({ color: 0xede8da, roughness: 0.75, metalness: 0.04 });
        const red = new THREE.MeshStandardMaterial({ color: 0xb23a2c, roughness: 0.6 });
        const dark = new THREE.MeshStandardMaterial({ color: 0x26262d, roughness: 0.5, metalness: 0.3 });
        lanternMat = new THREE.MeshStandardMaterial({
          color: 0xffd27a, emissive: 0xffb347, emissiveIntensity: 2.0, roughness: 0.3,
        });

        const towerH = 18;
        const tower = new THREE.Mesh(new THREE.CylinderGeometry(2.1, 3.0, towerH, 28), white);
        tower.position.y = towerH / 2;
        g.add(tower);

        // gallery deck + railing at the top of the tower
        const gallery = new THREE.Mesh(new THREE.CylinderGeometry(3.0, 3.0, 0.7, 28), dark);
        gallery.position.y = towerH + 0.35;
        g.add(gallery);
        const rail = new THREE.Mesh(new THREE.TorusGeometry(2.85, 0.13, 8, 28), dark);
        rail.rotation.x = Math.PI / 2;
        rail.position.y = towerH + 1.3;
        g.add(rail);

        // lantern room (glowing glass)
        const lanternH = 3.2;
        const lanternY = towerH + 0.7 + lanternH / 2;
        const lantern = new THREE.Mesh(new THREE.CylinderGeometry(2.0, 2.0, lanternH, 16), lanternMat);
        lantern.position.y = lanternY;
        g.add(lantern);

        // conical roof + finial
        const roof = new THREE.Mesh(new THREE.ConeGeometry(2.35, 2.6, 16), red);
        roof.position.y = towerH + 0.7 + lanternH + 1.3;
        g.add(roof);
        const finial = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12, 12), dark);
        finial.position.y = towerH + 0.7 + lanternH + 2.6;
        g.add(finial);

        // point light at the lantern — casts a warm wash on nearby buildings
        const light = new THREE.PointLight(0xffb86a, 900, 140, 2.0);
        light.position.y = lanternY;
        g.add(light);

        // glowing halo sprite at the lantern (bloom)
        const tex = new THREE.CanvasTexture(glowCanvas());
        glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
          map: tex, color: 0xffc46a, transparent: true, opacity: 0.9,
          blending: THREE.AdditiveBlending, depthWrite: false,
        }));
        glowSprite.scale.set(16, 16, 1);
        glowSprite.position.y = lanternY;
        g.add(glowSprite);

        // base glow pooling on the ground
        haloMat = new THREE.MeshBasicMaterial({
          color: 0xffb347, transparent: true, opacity: 0.22,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
        });
        const halo = new THREE.Mesh(new THREE.CircleGeometry(10, 40), haloMat);
        halo.rotation.x = -Math.PI / 2;
        halo.position.y = 0.12;
        g.add(halo);

        return g;
      }

      // ---- MapLibre custom layer hosting the Three.js scene
      const merc = maplibregl.MercatorCoordinate.fromLngLat([MODEL.lng, MODEL.lat], 0);
      const meterScale = merc.meterInMercatorCoordinateUnits();

      const lighthouseLayer = {
        id: "lighthouse-3d",
        type: "custom",
        renderingMode: "3d",
        onAdd(m, gl) {
          this.map = m;
          this.camera = new THREE.Camera();
          this.scene = new THREE.Scene();
          this.scene.add(new THREE.AmbientLight(0xc2c8d4, 1.7));
          const dir = new THREE.DirectionalLight(0xffffff, 2.3);
          dir.position.set(30, 60, 40);
          this.scene.add(dir);
          this.scene.add(buildLighthouse());
          this.renderer = new THREE.WebGLRenderer({ canvas: m.getCanvas(), context: gl, antialias: true });
          this.renderer.autoClear = false;
        },
        render(gl, args) {
          // Model is the street-level representation only.
          if (this.map.getZoom() < 14) return;

          const t = performance.now();
          const pulse = 1.7 + 0.7 * Math.sin(t / 600);
          if (lanternMat) lanternMat.emissiveIntensity = pulse;
          if (glowSprite) glowSprite.material.opacity = 0.7 + 0.25 * Math.sin(t / 600);
          if (haloMat) haloMat.opacity = 0.18 + 0.08 * Math.sin(t / 600);

          const proj = (args.defaultProjectionData && args.defaultProjectionData.mainMatrix) || args.matrix;
          const m = new THREE.Matrix4().fromArray(proj);
          const l = new THREE.Matrix4()
            .makeTranslation(merc.x, merc.y, merc.z)
            .scale(new THREE.Vector3(meterScale, -meterScale, meterScale))
            .multiply(new THREE.Matrix4().makeRotationX(Math.PI / 2));
          this.camera.projectionMatrix = m.multiply(l);

          this.renderer.resetState();
          this.renderer.render(this.scene, this.camera);
          this.map.triggerRepaint();
        },
      };

      map.on("style.load", () => {
        map.setProjection({ type: "globe" });
        map.setSky({
          "atmosphere-blend": ["interpolate", ["linear"], ["zoom"], 0, 1, 5, 1, 7, 0],
        });

        // ---- 3D buildings: extrude OpenFreeMap's building layer by real height
        if (map.getLayer("building")) map.setLayoutProperty("building", "visibility", "none");
        let firstSymbol;
        for (const ly of map.getStyle().layers) {
          if (ly.type === "symbol") { firstSymbol = ly.id; break; }
        }
        map.addLayer(
          {
            id: "building-3d",
            source: "openmaptiles",
            "source-layer": "building",
            type: "fill-extrusion",
            minzoom: 14,
            paint: {
              "fill-extrusion-color": [
                "interpolate", ["linear"], ["coalesce", ["get", "render_height"], 8],
                0, "#2a2b34", 30, "#3a3d49", 80, "#4c5063",
              ],
              "fill-extrusion-height": ["coalesce", ["get", "render_height"], ["get", "height"], 8],
              "fill-extrusion-base": ["coalesce", ["get", "render_min_height"], ["get", "min_height"], 0],
              "fill-extrusion-opacity": 0.92,
              "fill-extrusion-vertical-gradient": true,
            },
          },
          firstSymbol,
        );

        // ---- all lighthouses as glow symbols (the future far-zoom representation),
        // faded out at street zoom so the 3D model is the focus there.
        const gc = glowCanvas();
        map.addImage("glow", gc.getContext("2d").getImageData(0, 0, gc.width, gc.height), { pixelRatio: 2 });
        fetch("/lighthouses.geojson")
          .then((r) => r.json())
          .then((geojson) => {
            document.getElementById("count").textContent =
              geojson.features.length.toLocaleString() + " lighthouses · 1 in 3D";
            map.addSource("lighthouses", { type: "geojson", data: geojson });
            map.addLayer({
              id: "lighthouse-glow",
              type: "symbol",
              source: "lighthouses",
              layout: {
                "icon-image": "glow",
                "icon-allow-overlap": true,
                "icon-ignore-placement": true,
                "icon-size": ["interpolate", ["linear"], ["zoom"], 1, 0.18, 4, 0.3, 8, 0.45, 14, 0.5],
              },
              paint: {
                "icon-opacity": ["interpolate", ["linear"], ["zoom"], 13, 0.9, 16, 0.35, 18, 0.1],
              },
            });
          });

        // ---- the one 3D lighthouse, on top
        map.addLayer(lighthouseLayer);
      });

      // HUD: live zoom + whether we're looking at the globe, a 3D street, or top-down.
      const zoomEl = document.getElementById("zoom");
      const projEl = document.getElementById("proj");
      function updateHud() {
        const z = map.getZoom(), p = map.getPitch();
        zoomEl.textContent = z.toFixed(2);
        projEl.textContent = z < 6 ? "globe" : p >= 30 ? `3D street · ${Math.round(p)}° tilt` : "flat (top-down)";
      }
      map.on("move", updateHud);
      map.on("load", updateHud);

      // FPS
      const fpsEl = document.getElementById("fps");
      let frames = 0, last = performance.now();
      (function tick(now) {
        frames++;
        if (now - last >= 500) {
          fpsEl.textContent = Math.round((frames * 1000) / (now - last)) + " fps";
          frames = 0; last = now;
        }
        requestAnimationFrame(tick);
      })(performance.now());
    </script>
  </body>
</html>
